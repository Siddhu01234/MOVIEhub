<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MovieHub</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#111;
    color:white;
}

/* Header */

.header{
    background:#000;
    color:#ffcc00;
    text-align:center;
    padding:20px;
    font-size:40px;
    font-weight:bold;
    position:sticky;
    top:0;
    z-index:100;
}

/* Search Box */

.search-container{
    text-align:center;
    padding:20px;
}

#searchBox{
    width:80%;
    max-width:500px;
    padding:12px;
    border:none;
    border-radius:8px;
    font-size:18px;
    outline:none;
}

/* Movie Grid */

.container{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(500px,1fr));
    gap:20px;
    padding:20px;
}

/* Movie Card */

.movie-card{
    text-decoration:none;
    display:block;
}

.card{
    width:100%;
    background:#1d1d1d;
    border-radius:12px;
    overflow:hidden;
    transition:0.3s;
    box-shadow:0 0 10px rgba(0,0,0,0.4);
}

.card:hover{
    transform:scale(1.03);
}

.card img{
    width:100%;
    aspect-ratio:16/9;
    object-fit:cover;
    display:block;
}

.card h3{
    text-align:center;
    padding:15px;
    color:white;
    font-size:20px;
    margin:0;
}

/* Mobile */

@media(max-width:768px){

    .container{
        grid-template-columns:1fr;
    }

    .header{
        font-size:30px;
    }

    .card h3{
        font-size:18px;
    }

    #searchBox{
        width:95%;
    }
}

</style>

</head>

<body>

<div class="header">
🎬 MovieHub
</div>

<div class="search-container">
<input
type="text"
id="searchBox"
placeholder="Search Movies..."
onkeyup="searchMovies()">
</div>

<div class="container" id="movieContainer"></div>

<script>

let allMovies = [];

fetch("movies.json")
.then(response => response.json())
.then(data => {
    allMovies = data;
    displayMovies(data);
})
.catch(error => {
    console.error("Movies JSON load error:", error);
});

function displayMovies(movies){

    const container =
    document.getElementById("movieContainer");

    container.innerHTML = "";

    movies.forEach(movie => {

        container.innerHTML += `
        <a href="${movie.telegram}"
           target="_blank"
           class="movie-card">

            <div class="card">

                <img src="${movie.image}"
                     alt="${movie.title}">

                <h3>${movie.title}</h3>

            </div>

        </a>
        `;
    });
}

function searchMovies(){

    let search =
    document.getElementById("searchBox")
    .value
    .toLowerCase();

    let filtered =
    allMovies.filter(movie =>
        movie.title
        .toLowerCase()
        .includes(search)
    );

    displayMovies(filtered);
}

</script>

</body>
</html>
